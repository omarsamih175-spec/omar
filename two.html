<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why You're My Universe, Aya 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;600&family=Tajawal:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --deep-space: #04050f;
            --midnight: #080c1a;
            --nebula-purple: #6b3fa0;
            --star-gold: #f5d77e;
            --rose-stardust: #d4768a;
            --moonlight: #e8e0f5;
            --cosmic-pink: #c47ab5;
            --card-bg: rgba(14, 18, 40, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            min-height: 100vh;
            background: var(--deep-space);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            padding: 3rem 1.5rem;
            position: relative;
        }

        .cursor {
            width: 12px; height: 12px;
            background: var(--star-gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--star-gold);
        }

        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

        .nebula { position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0; }
        .nebula-1 { width:800px;height:800px;background:radial-gradient(circle,rgba(107,63,160,.35) 0%,transparent 70%);top:-300px;left:-200px;animation:nb 12s ease-in-out infinite; }
        .nebula-2 { width:600px;height:600px;background:radial-gradient(circle,rgba(196,122,181,.28) 0%,transparent 70%);bottom:-200px;right:-100px;animation:nb 9s ease-in-out infinite reverse; }
        .nebula-3 { width:500px;height:500px;background:radial-gradient(circle,rgba(107,63,160,.25) 0%,transparent 70%);top:50%;left:60%;animation:nb 15s ease-in-out infinite; }
        .nebula-4 { width:400px;height:400px;background:radial-gradient(circle,rgba(180,80,200,.2) 0%,transparent 70%);top:30%;left:10%;animation:nb 11s ease-in-out infinite reverse; }
        .nebula-5 { width:350px;height:350px;background:radial-gradient(circle,rgba(107,63,160,.22) 0%,transparent 70%);bottom:20%;left:40%;animation:nb 14s ease-in-out infinite; }
        @keyframes nb{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
        @keyframes floatHeart{0%{transform:translateY(100vh) rotate(0deg);opacity:.7}100%{transform:translateY(-100px) rotate(360deg);opacity:0}}

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .page-title {
            font-family: 'Tajawal', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.8rem);
            color: var(--moonlight);
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(232,224,245,0.4);
            direction: rtl;
        }

        .page-title span { color: var(--star-gold); }

        .subtitle {
            font-family: 'Tajawal', sans-serif;
            color: var(--cosmic-pink);
            font-size: 1rem;
            letter-spacing: 0.15em;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .deco-line {
            width: 180px; height: 1px;
            background: linear-gradient(90deg, transparent, var(--star-gold), transparent);
            margin: 1rem auto 3rem;
        }

        /* Reason cards */
        #reasons-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .reason-card {
            background: var(--card-bg);
            border: 1px solid rgba(245, 215, 126, 0.15);
            border-radius: 4px;
            padding: 2rem 2.5rem;
            text-align: right;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            direction: rtl;
        }

        .reason-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 3px; height: 100%;
            background: linear-gradient(180deg, var(--star-gold), var(--cosmic-pink));
        }

        .reason-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top right, rgba(245,215,126,0.06), transparent 60%);
            pointer-events: none;
        }

        .reason-card:hover {
            transform: translateX(-8px);
            border-color: rgba(245, 215, 126, 0.4);
            box-shadow: 0 10px 40px rgba(107, 63, 160, 0.3), 5px 0 20px rgba(245, 215, 126, 0.1);
        }

        .card-number {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            color: var(--star-gold);
            opacity: 0.8;
            margin-bottom: 0.8rem;
            font-weight: 400;
        }

        .reason-emoji {
            font-size: 1.5rem;
            margin-bottom: 0.8rem;
            display: block;
            filter: drop-shadow(0 0 8px rgba(245,215,126,0.5));
        }

        .reason-text {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--moonlight);
            font-weight: 300;
            line-height: 1.8;
            font-style: italic;
        }

        .reason-arabic {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.9rem;
            color: var(--cosmic-pink);
            margin-top: 0.8rem;
            opacity: 0.8;
            text-align: right;
        }

        /* GIF overlay on hover */
        .gif-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 120px; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }

        .gif-overlay img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid rgba(245,215,126,0.3);
        }

        .reason-card:hover .gif-overlay { opacity: 1; }
        .reason-card:hover .reason-text { padding-left: 130px; }

        /* Button */
        .reveal-button {
            display: inline-block;
            padding: 1rem 3rem;
            font-family: 'Tajawal', sans-serif;
            font-size: 1.05rem;
            letter-spacing: 0.03em;
            color: var(--deep-space);
            background: linear-gradient(135deg, var(--star-gold), #f0c860, var(--star-gold));
            border: none;
            cursor: pointer;
            margin: 2rem 0 1rem;
            transition: all 0.4s ease;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            box-shadow: 0 0 30px rgba(245,215,126,0.3);
            position: relative;
            overflow: hidden;
        }

        .reveal-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .reveal-button:hover::before { left: 100%; }
        .reveal-button:hover {
            box-shadow: 0 0 50px rgba(245,215,126,0.6);
            transform: translateY(-3px);
        }

        .reveal-button.final-mode {
            background: linear-gradient(135deg, var(--nebula-purple), var(--cosmic-pink));
            color: white;
        }

        .reason-counter {
            font-family: 'Cinzel', serif;
            font-size: 0.75rem;
            letter-spacing: 0.3em;
            color: rgba(245,215,126,0.5);
            margin-top: 0.5rem;
        }

        /* Floating stars */
        .float-star {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            animation: floatStar linear forwards;
        }

        @keyframes floatStar {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-400px) scale(0.5); }
        }

        @media (max-width: 600px) {
            .gif-overlay { display: none; }
            .reason-card:hover .reason-text { padding-right: 0; }
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>
    <div class="nebula nebula-4"></div>
    <div class="nebula nebula-5"></div>
    <div class="cursor" id="cursor"></div>

    <div class="container">
        <p class="subtitle">✦ &nbsp; لأنك كل شيء &nbsp; ✦</p>
        <h1 class="page-title">ليش انتي <span>كوني</span>، يا اية</h1>
        <div class="deco-line"></div>

        <div id="reasons-container"></div>

        <button class="reveal-button" id="revealBtn">اكتشفي السبب الجاي ✨</button>
        <div class="reason-counter" id="counter"></div>
    </div>

    <script>
        const reasons = [
            {
                text: "انتي احلا شي بحياتي 😊 ضحكتك و عيونك احلا شي انخلق بهالدنيا، و لما أشوفك مبتسمة و مبسوطة بحس كلشي نَور حوالي و صار حلو 🥰",
                arabic: "ضحكتك بتضوي الدنيا كلها يا أيا ✨",
                emoji: "😊",
                gif: "gif1.gif"
            },
            {
                text: "بس تكوني معي كتير برتاح 🤍 بس اكون معك بحس اني اسعد واحد بالدنيا، و مافي حد مبسوط بحياتو اكتر مني",
                arabic: "معك بحس اني بالبيت 🌙",
                emoji: "🌙",
                gif: "gif2.gif"
            },
            {
                text: "ما في أطيب منك بكل الكون 💛 كيف بتقلقي عليي، كيف شخصيتك معي، كيف دايماً بتتعبي اكتر مني... كل هاد بحكي قديش انتي شخص بجنن",
                arabic: "قلبك من ذهب ما بتعوض 💛",
                emoji: "💛",
                gif: "gif1.gif"
            },
            {
                text: "انتي السبب اني هلأ عايش و مبسوط 💫 كلشي حلو بالدنيا ما بتقارن معك ولا واحد بالمية",
                arabic: "انتي سبب سعادتي كلها 💜",
                emoji: "💫",
                gif: "gif2.gif"
            },
            {
                text: "كلشي بتلمسيه، بتسويه، بتدخلي فيه بصير حلو 🌸 حياتي، أنا، حتى المسج العادي كتير بس انتي تكتبيه بشوفو كتير حلو",
                arabic: "انتي بتحولي كلشي لشي حلو 🌸",
                emoji: "🌸",
                gif: "gif1.gif"
            },
            {
                text: "دايما كنتي جنبي 🌌 حتى لما كنت زمان كتير حد ما سوا شي بحياتو، و انكد و اضغطك و اسوي كل هاد، ما تغيرتي و ضليتي اية الي بعرفها. شكراً لأنك بحياتي يا أيا ❤️",
                arabic: "شكراً لأنك ما تغيرتي و ضليتي انتي ❤️",
                emoji: "🌌",
                gif: "gif2.gif"
            }
        ];

        let currentIndex = 0;
        let isTransitioning = false;
        const container = document.getElementById('reasons-container');
        const btn = document.getElementById('revealBtn');
        const counter = document.getElementById('counter');

        function createCard(reason, index) {
            const card = document.createElement('div');
            card.className = 'reason-card';
            card.innerHTML = `
                <div class="reason-text" style="font-family:'Tajawal',sans-serif;direction:rtl;font-style:normal;font-size:1.1rem;line-height:2;">${reason.text}</div>
                <div class="gif-overlay"><img src="${reason.gif}" alt=""></div>
            `;
            card.style.opacity = '0';
            card.style.transform = 'translateY(40px)';
            container.appendChild(card);

            requestAnimationFrame(() => {
                card.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            });
        }

        function revealNext() {
            if (isTransitioning) return;
            isTransitioning = true;

            if (currentIndex < reasons.length) {
                createCard(reasons[currentIndex], currentIndex);
                counter.textContent = `السبب ${currentIndex + 1} من ${reasons.length}`;
                currentIndex++;
                spawnStars();

                if (currentIndex === reasons.length) {
                    btn.textContent = 'last words for my moon\'s birthday 🌙';
                    btn.classList.add('final-mode');
                    btn.onclick = () => {
                        document.body.animate([{opacity:1},{opacity:0}], {duration:800, fill:'forwards'}).onfinish = () => {
                            window.location.href = 'three.html';
                        };
                    };
                    btn.removeEventListener('click', revealNext);
                }
            }

            setTimeout(() => isTransitioning = false, 600);
        }

        btn.addEventListener('click', revealNext);

// ── Shared background: stars + canvas hearts + shooting stars + floating hearts ──
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);

        const stars = Array.from({length: 420}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2 + 0.2,
            alpha: Math.random(),
            speed: Math.random() * 0.004 + 0.001,
            color: ['#f5d77e','#e8e0f5','#c47ab5','#ffffff','#a855f7','#d8b4fe','#9333ea','#c084fc'][Math.floor(Math.random()*8)]
        }));

        const canvasHearts = Array.from({length: 18}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 8 + 4,
            alpha: Math.random() * 0.4 + 0.1,
            speed: Math.random() * 0.003 + 0.001,
            dy: -(Math.random() * 0.3 + 0.1),
            color: ['#c47ab5','#a855f7','#d4768a','#e879f9'][Math.floor(Math.random()*4)]
        }));

        function drawHeart(cx, cy, size, color, alpha) {
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(cx, cy + size * 0.3);
            ctx.bezierCurveTo(cx, cy, cx - size, cy, cx - size, cy + size * 0.5);
            ctx.bezierCurveTo(cx - size, cy + size, cx, cy + size * 1.35, cx, cy + size * 1.5);
            ctx.bezierCurveTo(cx, cy + size * 1.35, cx + size, cy + size, cx + size, cy + size * 0.5);
            ctx.bezierCurveTo(cx + size, cy, cx, cy, cx, cy + size * 0.3);
            ctx.fill();
            ctx.restore();
        }

        (function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                s.alpha += s.speed;
                if (s.alpha > 1 || s.alpha < 0.1) s.speed *= -1;
                ctx.globalAlpha = Math.max(0.1, Math.min(1, s.alpha));
                ctx.fillStyle = s.color;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fill();
            });
            canvasHearts.forEach(h => {
                h.alpha += h.speed;
                if (h.alpha > 0.5 || h.alpha < 0.05) h.speed *= -1;
                h.y += h.dy;
                if (h.y < -20) { h.y = canvas.height + 20; h.x = Math.random() * canvas.width; }
                drawHeart(h.x, h.y, h.size, h.color, h.alpha);
            });
            ctx.globalAlpha = 1;
            requestAnimationFrame(draw);
        })();

        // Floating emoji hearts
        const heartEmojis = ['💜','💜','💜','🌙','✨','💫','🌟','💜','💕','💖'];
        function spawnHeart() {
            const h = document.createElement('div');
            h.style.cssText = `position:fixed;pointer-events:none;z-index:2;font-size:${10+Math.random()*18}px;left:${Math.random()*100}vw;animation:floatHeart ${6+Math.random()*8}s ${Math.random()*2}s linear infinite;`;
            h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 14000);
        }
        for (let i = 0; i < 14; i++) setTimeout(spawnHeart, i * 400);
        setInterval(spawnHeart, 1400);

        // Shooting stars
        function shoot() {
            const el = document.createElement('div');
            el.style.cssText = `position:fixed;width:2px;height:2px;background:white;border-radius:50%;z-index:1;pointer-events:none;left:${Math.random()*window.innerWidth}px;top:${Math.random()*window.innerHeight*.4}px`;
            document.body.appendChild(el);
            const d = 250 + Math.random() * 250;
            el.animate([
                {transform:'translate(0,0)',opacity:1,width:'2px',boxShadow:'0 0 4px white'},
                {transform:`translate(${d*.7}px,${d*.4}px)`,opacity:0,width:'60px',boxShadow:'0 0 10px white,0 0 20px rgba(245,215,126,.6)'}
            ],{duration:700+Math.random()*400,easing:'ease-out'}).onfinish=()=>el.remove();
        }
        setInterval(shoot, 2500);

        // Cursor
        const cur = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cur.style.left = (e.clientX - 6) + 'px';
            cur.style.top = (e.clientY - 6) + 'px';
        });

        function spawnStars() {
            const emojis = ['✨','🌟','💫','⭐','🌙','💜'];
            for (let i = 0; i < 6; i++) {
                const el = document.createElement('div');
                el.className = 'float-star';
                el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                el.style.cssText = `left:${Math.random()*window.innerWidth}px;bottom:${Math.random()*200}px;font-size:${12+Math.random()*18}px;animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.5}s`;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 4000);
            }
        }

        setInterval(() => spawnStars(), 4000);
    </script>
</body>
</html>
